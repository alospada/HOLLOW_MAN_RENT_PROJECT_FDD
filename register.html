<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your HollowManRent account to start browsing and booking rental listings." />
  <title>Register – HollowManRent</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/register.css" />
  <link rel="stylesheet" href="css/footer.css" />
</head>
<body class="page-register">
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="bg-grain" aria-hidden="true"></div>

  <main class="page-wrapper" role="main">
    <div class="register-card" role="region" aria-labelledby="register-heading">

      <div class="register-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/>
          <line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
      </div>

      <h1 id="register-heading" class="register-title">Register</h1>
      <p class="register-subtitle">Create your HollowManRent account</p>

      <div class="alert alert-error" id="form-alert" role="alert" aria-live="polite" hidden>
        <span id="alert-message"></span>
      </div>

      <form id="register-form" class="register-form" novalidate aria-label="Registration form">

        <div class="field-group">
          <label for="email" class="field-label">Email</label>
          <div class="input-wrapper">
            <input
              type="email"
              id="email"
              name="email"
              class="field-input"
              placeholder="you@example.com"
              autocomplete="email"
              aria-required="true"
              aria-describedby="email-error"
            />
          </div>
          <span class="field-error" id="email-error" role="alert" aria-live="polite"></span>
        </div>

        <div class="field-group">
          <label for="password" class="field-label">Password</label>
          <div class="input-wrapper input-wrapper--password">
            <input
              type="password"
              id="password"
              name="password"
              class="field-input"
              placeholder="Minimum 6 characters"
              autocomplete="new-password"
              aria-required="true"
              aria-describedby="password-error"
            />
            <button type="button" class="toggle-pw" id="toggle-pw-1"
              aria-label="Show password" tabindex="0">
              <svg class="eye-icon eye-show" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-icon eye-hide" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="password-error" role="alert" aria-live="polite"></span>

          <div class="strength-bar" aria-hidden="true">
            <div class="strength-fill" id="strength-fill"></div>
          </div>
          <span class="strength-label" id="strength-label" aria-live="polite"></span>
        </div>

        <div class="field-group">
          <label for="confirm-password" class="field-label">Confirm Password</label>
          <div class="input-wrapper input-wrapper--password">
            <input
              type="password"
              id="confirm-password"
              name="confirm-password"
              class="field-input"
              placeholder="Confirm your password"
              autocomplete="new-password"
              aria-required="true"
              aria-describedby="confirm-error"
            />
            <button type="button" class="toggle-pw" id="toggle-pw-2"
              aria-label="Show confirm password" tabindex="0">
              <svg class="eye-icon eye-show" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-icon eye-hide" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="confirm-error" role="alert" aria-live="polite"></span>
        </div>

        <button type="submit" class="btn-register" id="btn-register" aria-label="Create your account">
          <span class="btn-label">Register</span>
          <span class="btn-spinner" id="btn-spinner" aria-hidden="true" hidden></span>
        </button>

      </form>

      <p class="login-prompt">
        Already have an account?
        <a href="login.html" class="login-link" aria-label="Go to the login page">Login here</a>
      </p>

    </div>
  </main>

    <script src="js/shared.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
